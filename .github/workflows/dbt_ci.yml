name: dbt CI

on:
  pull_request:
    branches: [main]
    paths:
      - "models/**"
      - "tests/**"
      - "macros/**"
      - "snapshots/**"
      - "seeds/**"
      - "dbt_project.yml"

jobs:
  dbt-test:
    name: Compile & Test dbt models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          pip install dbt-core==1.11.7 dbt-bigquery==1.11.1

      - name: Write BigQuery credentials
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/citibike_keyfile.json

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          citibike_analytics:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: citibike-analytics-492418
                dataset: citibike_staging
                keyfile: /tmp/citibike_keyfile.json
                location: EU
                threads: 4
                timeout_seconds: 300
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt compile
        run: dbt compile

      - name: dbt seed
        run: dbt seed

      - name: dbt run
        run: dbt run

      - name: dbt test
        run: dbt test
