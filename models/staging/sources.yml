version: 2

sources:
  - name: citibike_raw
    database: citibike-analytics-492418
    schema: citibike_raw
    description: Raw CitiBike GBFS data

    tables:
      - name: raw_station_information
        description: Static station metadata from GBFS station_information endpoint

      - name: raw_station_status
        description: Real-time station availability snapshots from GBFS station_status endpoint
        columns:
          - name: station_id
            description: Station identifier
          - name: num_bikes_available
            description: Number of bikes available for rental
          - name: num_ebikes_available
            description: Number of e-bikes available for rental
          - name: num_bikes_disabled
            description: Number of bikes that are disabled
          - name: num_docks_available
            description: Number of docks available for returns
          - name: num_docks_disabled
            description: Number of docks that are disabled
          - name: is_installed
            description: Whether the station is installed
          - name: is_renting
            description: Whether the station is accepting bike rentals
          - name: is_returning
            description: Whether the station is accepting bike returns
          - name: last_reported
            description: Unix timestamp of the last status report from the station
          - name: ingested_at
            description: Timestamp when this record was ingested into BigQuery

      - name: raw_system_regions
        description: CitiBike system region definitions from GBFS system_regions endpoint
        columns:
          - name: region_id
            description: Region identifier
          - name: name
            description: Human-readable region name
          - name: ingested_at
            description: Timestamp when this record was ingested into BigQuery

      - name: raw_free_bike_status
        description: Dockless bikes currently deployed in the field from GBFS free_bike_status endpoint
        columns:
          - name: bike_id
            description: Unique bike identifier
          - name: lat
            description: Current latitude of the bike
          - name: lon
            description: Current longitude of the bike
          - name: is_reserved
            description: Whether the bike is currently reserved
          - name: is_disabled
            description: Whether the bike is currently disabled
          - name: vehicle_type_id
            description: Vehicle type identifier (e.g. classic, ebike)
          - name: ingested_at
            description: Timestamp when this record was ingested into BigQuery

      - name: raw_pricing_plans
        description: CitiBike membership and pricing tiers from GBFS system_pricing_plans endpoint
        columns:
          - name: plan_id
            description: Unique pricing plan identifier
          - name: name
            description: Human-readable plan name
          - name: currency
            description: ISO 4217 currency code
          - name: price
            description: Plan price
          - name: is_taxable
            description: Whether the plan is subject to tax
          - name: description
            description: Full plan description including per-minute rates
          - name: ingested_at
            description: Timestamp when this record was ingested into BigQuery